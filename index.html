<!DOCTYPE html>

        .minimal-input:focus {
            border-image: linear-gradient(to right, #ffd8e7, #bbebf1) 1;
        }

    body {
      min-height: max(884px, 100dvh);

<body class="bg-surface text-on-surface font-body-md text-body-md antialiased min-h-screen flex flex-col relative overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Ambient Background Element -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none z-[-1] overflow-hidden">
<div class="absolute -top-[20%] -right-[10%] w-[70vw] h-[70vw] rounded-full bg-gradient-to-br from-primary-fixed/20 to-secondary-fixed/20 blur-[80px]"></div>
</div>
<!-- Task-focused Top App Bar (Replaces global nav for transactional screen) -->
<header class="flex items-center justify-between px-margin-mobile py-4 sticky top-0 z-50 bg-surface/80 backdrop-blur-md border-b border-outline-variant/30 transition-all duration-300">
<button class="text-on-surface p-2 -ml-2 rounded-full hover:bg-surface-container-high transition-colors active:scale-95 cursor-pointer flex items-center justify-center">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight absolute left-1/2 -translate-x-1/2">Tambah Vendor</h1>
<div class="w-10"></div> <!-- Spacer to ensure title centering -->
</header>
<!-- Main Form Area -->
<main class="flex-grow px-margin-mobile py-6 pb-32">
<div class="bg-surface-container-lowest/70 backdrop-blur-xl border border-secondary-fixed-dim/30 rounded-xl p-6 shadow-[0_8px_32px_rgba(176,224,230,0.15)] max-w-lg mx-auto">
<form class="space-y-6">
<!-- Vendor Name Input -->
<div class="relative group">
<label class="font-label-sm text-label-sm text-on-surface-variant block mb-1 uppercase tracking-widest transition-colors group-focus-within:text-primary" for="vendor_name">Nama Vendor</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-2 px-0 text-body-md font-body-md text-on-surface placeholder:text-on-surface-variant/40 focus:ring-0 focus:border-primary transition-colors minimal-input" id="vendor_name" placeholder="Misal: The Grand Blooming" type="text"/>
</div>
<!-- Category Dropdown -->
<div class="relative group">
<label class="font-label-sm text-label-sm text-on-surface-variant block mb-1 uppercase tracking-widest transition-colors group-focus-within:text-primary" for="vendor_category">Kategori</label>
<div class="relative">
<select class="w-full bg-transparent border-0 border-b border-outline-variant py-2 px-0 pr-8 text-body-md font-body-md text-on-surface appearance-none focus:ring-0 focus:border-primary transition-colors minimal-input cursor-pointer" id="vendor_category">
<option class="text-on-surface-variant" disabled="" selected="" value="">Pilih Kategori</option>
<option value="venue">Venue &amp; Lokasi</option>
<option value="catering">Katering</option>
<option value="photography">Fotografi &amp; Videografi</option>
<option value="decoration">Dekorasi &amp; Florist</option>
<option value="attire">Gaun &amp; Jas</option>
<option value="makeup">Make Up Artist</option>
<option value="entertainment">Hiburan &amp; Musik</option>
<option value="other">Lainnya</option>
</select>
<span class="material-symbols-outlined absolute right-0 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<!-- Phone Input -->
<div class="relative group">
<label class="font-label-sm text-label-sm text-on-surface-variant block mb-1 uppercase tracking-widest transition-colors group-focus-within:text-primary" for="vendor_phone">No. Telepon / WhatsApp</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-2 px-0 text-body-md font-body-md text-on-surface placeholder:text-on-surface-variant/40 focus:ring-0 focus:border-primary transition-colors minimal-input" id="vendor_phone" placeholder="+62 812 3456 7890" type="tel"/>
</div>
<!-- Email Input -->
<div class="relative group">
<label class="font-label-sm text-label-sm text-on-surface-variant block mb-1 uppercase tracking-widest transition-colors group-focus-within:text-primary" for="vendor_email">Email</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-2 px-0 text-body-md font-body-md text-on-surface placeholder:text-on-surface-variant/40 focus:ring-0 focus:border-primary transition-colors minimal-input" id="vendor_email" placeholder="hello@vendor.com" type="email"/>
</div>
<!-- Notes Textarea -->
<div class="relative group">
<label class="font-label-sm text-label-sm text-on-surface-variant block mb-1 uppercase tracking-widest transition-colors group-focus-within:text-primary" for="vendor_notes">Catatan Tambahan</label>
<textarea class="w-full bg-transparent border-0 border-b border-outline-variant py-2 px-0 text-body-md font-body-md text-on-surface placeholder:text-on-surface-variant/40 focus:ring-0 focus:border-primary transition-colors minimal-input resize-none" id="vendor_notes" placeholder="Informasi detail mengenai paket atau kontak person..." rows="3"></textarea>
</div>
</form>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 right-0 p-margin-mobile bg-gradient-to-t from-surface via-surface/90 to-transparent pb-8 pt-12 z-40 max-w-lg mx-auto">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-body-lg text-body-lg py-4 rounded-full shadow-[0_8px_20px_rgba(121,84,101,0.25)] flex justify-center items-center gap-2 hover:opacity-90 active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">save</span>
            Simpan Vendor
        </button>
</div>
</body></html>
