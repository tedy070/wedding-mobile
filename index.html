<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tambah Anggaran - Union &amp; Grace</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Noto+Serif:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-container": "#765162",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#f2f0f0",
                        "surface-bright": "#fbf9f8",
                        "primary": "#795465",
                        "on-secondary-fixed-variant": "#1d4d53",
                        "on-tertiary-fixed": "#1a1c1c",
                        "primary-fixed-dim": "#e9bacd",
                        "surface-tint": "#795465",
                        "surface-container-highest": "#e4e2e2",
                        "on-error-container": "#93000a",
                        "secondary-container": "#b8e8ee",
                        "inverse-primary": "#e9bacd",
                        "on-tertiary-container": "#5a5c5c",
                        "surface-container-high": "#eae8e7",
                        "secondary-fixed-dim": "#9fcfd5",
                        "on-background": "#1b1c1c",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#001f23",
                        "surface-container": "#efeded",
                        "on-error": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-surface": "#1b1c1c",
                        "background": "#fbf9f8",
                        "on-surface-variant": "#4f4448",
                        "on-secondary-container": "#3b6a6f",
                        "surface-container-low": "#f5f3f3",
                        "surface-dim": "#dbd9d9",
                        "on-tertiary-fixed-variant": "#454747",
                        "on-primary": "#ffffff",
                        "secondary": "#37656b",
                        "surface": "#fbf9f8",
                        "primary-container": "#f8c8dc",
                        "tertiary-container": "#d4d5d5",
                        "secondary-fixed": "#bbebf1",
                        "surface-variant": "#e4e2e2",
                        "primary-fixed": "#ffd8e7",
                        "on-primary-fixed-variant": "#5f3c4d",
                        "on-primary-fixed": "#2e1221",
                        "tertiary": "#5d5f5f",
                        "tertiary-fixed": "#e2e2e2",
                        "outline-variant": "#d2c3c7",
                        "inverse-surface": "#303030",
                        "error-container": "#ffdad6",
                        "outline": "#817478",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "section-gap": "80px",
                        "margin-mobile": "16px",
                        "margin-desktop": "40px",
                        "gutter": "24px",
                        "container-max": "1200px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "headline-lg": ["Noto Serif"],
                        "headline-display": ["Noto Serif"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-md": ["Noto Serif"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],

                        "headline-md": ["24px", { "lineHeight": "1.4", "fontWeight": "400" }]

                }
            }
        }

<style>
        body {
            /* Ambient background for Ethereal Union theme */
            background: radial-gradient(circle at top right, rgba(248,200,220,0.15) 0%, transparent 40%),
                        radial-gradient(circle at bottom left, rgba(184,232,238,0.15) 0%, transparent 40%);
            background-color: theme('colors.surface');
            background-attachment: fixed;
        }
        
        /* Remove number input spinners */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface font-body-md h-screen flex flex-col antialiased overflow-hidden">
<!-- Header (Task-Focused, suppresses global nav) -->
<header class="flex items-center px-4 py-4 sticky top-0 z-50 bg-surface/80 backdrop-blur-md">
<button aria-label="Go back" class="mr-4 p-2 -ml-2 text-on-surface-variant hover:text-on-surface transition-colors rounded-full active:bg-surface-variant">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">Tambah Anggaran</h1>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto px-4 pt-6 pb-32">
<div class="max-w-md mx-auto space-y-8">
<!-- Amount Input (Prominent) -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Nominal</label>
<div class="flex items-baseline border-b border-outline-variant focus-within:border-primary transition-colors pb-1">
<span class="font-headline-lg text-headline-lg text-on-surface-variant mr-2">Rp</span>
<input class="w-full bg-transparent border-none focus:ring-0 px-0 font-headline-display text-headline-display text-on-surface placeholder:text-outline-variant/50" placeholder="0" type="number"/>
</div>
</div>
<!-- Expense Name Input -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Nama Pengeluaran</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 px-0 py-2 font-body-lg text-body-lg text-on-surface placeholder:text-outline-variant/70 transition-colors" placeholder="Contoh: DP Gedung" type="text"/>
</div>
<!-- Category Dropdown -->
<div class="space-y-2 relative">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Kategori</label>
<select class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 px-0 py-2 font-body-lg text-body-lg text-on-surface appearance-none transition-colors">
<option class="text-outline-variant" disabled="" selected="" value="">Pilih Kategori</option>
<option value="venue">Venue</option>
<option value="catering">Catering</option>
<option value="dekorasi">Dekorasi</option>
<option value="busana">Busana &amp; Rias</option>
<option value="dokumentasi">Dokumentasi</option>
<option value="lainnya">Lainnya</option>
</select>
<span class="material-symbols-outlined absolute right-0 bottom-2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
<!-- Payment Status (Chips) -->
<div class="space-y-3 pt-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Status Pembayaran</label>
<div class="flex flex-wrap gap-3">
<!-- Selected State (Simulated) -->
<button class="px-5 py-2.5 rounded-full bg-secondary-container/80 text-on-secondary-container border border-secondary-container font-body-md text-body-md shadow-sm transition-all flex items-center gap-1">
<span class="material-symbols-outlined text-[18px]">check</span>
                        Belum Dibayar
                    </button>
<!-- Unselected States -->
<button class="px-5 py-2.5 rounded-full bg-surface-container-lowest text-on-surface-variant border border-outline-variant hover:bg-surface-variant font-body-md text-body-md transition-all">
                        DP
                    </button>
<button class="px-5 py-2.5 rounded-full bg-surface-container-lowest text-on-surface-variant border border-outline-variant hover:bg-surface-variant font-body-md text-body-md transition-all">
                        Lunas
                    </button>
</div>
</div>
<!-- Notes Textarea -->
<div class="space-y-2 pt-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Catatan</label>
<textarea class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 px-0 py-2 font-body-md text-body-md text-on-surface placeholder:text-outline-variant/70 transition-colors resize-none" placeholder="Tambahkan detail atau vendor terkait..." rows="3"></textarea>
</div>
</div>
</main>
<!-- Bottom Fixed Action Area -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-surface/90 backdrop-blur-xl border-t border-surface-variant/50 shadow-[0_-10px_30px_rgba(176,224,230,0.15)] z-40 pb-safe">
<div class="max-w-md mx-auto">
<button class="w-full py-4 rounded-full bg-gradient-to-r from-primary to-secondary text-white font-body-lg text-body-lg flex justify-center items-center shadow-[0_4px_14px_rgba(121,84,101,0.25)] hover:opacity-95 active:scale-[0.98] transition-all">
                Simpan Anggaran
            </button>
</div>
</div>
</body></html>
