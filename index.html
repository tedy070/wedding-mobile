<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);

        }

            border-bottom: 1px solid theme('colors.outline-variant');

        }

            outline: none;

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased md:bg-surface-container-low">
<!-- Top Navigation (Transactional/Task focused -> Hidden nav shell, just a header) -->
<header class="sticky top-0 z-50 glass-panel md:hidden border-b border-surface-dim">
<div class="flex items-center justify-between px-margin-mobile py-4 w-full">
<button aria-label="Go back" class="text-on-surface hover:text-primary transition-colors cursor-pointer p-2 -ml-2" onclick="window.history.back()">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight font-bold">Tambah Tamu</h1>
<div class="w-10"></div> <!-- Spacer for center alignment -->
</div>
</header>
<!-- Desktop Header -->
<header class="hidden md:flex sticky top-0 z-50 bg-surface border-b border-outline-variant px-margin-desktop py-4 w-full items-center justify-between shadow-sm">
<div class="flex items-center gap-4">
<button aria-label="Go back" class="text-on-surface hover:text-primary transition-colors cursor-pointer p-2 rounded-full hover:bg-surface-variant" onclick="window.history.back()">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight font-bold">Tambah Tamu</h1>
</div>
<div class="font-headline-md text-headline-md text-primary tracking-tight">Union &amp; Grace</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow px-margin-mobile py-8 md:px-margin-desktop md:py-12 flex justify-center pb-32 md:pb-12">
<div class="w-full max-w-[600px] glass-panel rounded-xl p-6 md:p-8">
<form class="space-y-8 flex flex-col h-full">
<!-- Name Input -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="guest-name">Nama Lengkap</label>
<input class="text-input w-full font-body-md text-body-md text-on-surface placeholder:text-outline focus:ring-0" id="guest-name" placeholder="Masukkan nama tamu" type="text"/>
</div>
<!-- Relationship Group -->
<div class="flex flex-col gap-3">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Grup / Hubungan</label>
<div class="flex flex-wrap gap-2">
<button class="chip-active rounded-full px-4 py-2 font-label-sm text-label-sm cursor-pointer transition-all" type="button">Keluarga</button>
<button class="chip-inactive rounded-full px-4 py-2 font-label-sm text-label-sm cursor-pointer transition-all hover:bg-surface-variant" type="button">Teman</button>
<button class="chip-inactive rounded-full px-4 py-2 font-label-sm text-label-sm cursor-pointer transition-all hover:bg-surface-variant" type="button">Rekan Kerja</button>
<button class="chip-inactive rounded-full px-4 py-2 font-label-sm text-label-sm cursor-pointer transition-all hover:bg-surface-variant" type="button">Lainnya</button>
</div>
</div>
<!-- Contact Info -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="contact-info">Kontak (Email / No. HP)</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline pb-2">mail</span>
<input class="text-input w-full pl-8 font-body-md text-body-md text-on-surface placeholder:text-outline focus:ring-0" id="contact-info" placeholder="Email atau nomor telepon" type="text"/>
</div>
</div>
<!-- Number of Members -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="member-count">Jumlah Orang</label>
<div class="flex items-center gap-4">
<button aria-label="Kurangi" class="w-10 h-10 rounded-full border border-outline-variant flex items-center justify-center text-on-surface hover:bg-surface-variant transition-colors cursor-pointer" type="button">
<span class="material-symbols-outlined">remove</span>
</button>
<input class="text-center w-16 bg-transparent border-none font-headline-md text-headline-md text-primary focus:ring-0 p-0" id="member-count" min="1" readonly="" type="number" value="1"/>
<button aria-label="Tambah" class="w-10 h-10 rounded-full border border-outline-variant flex items-center justify-center text-on-surface hover:bg-surface-variant transition-colors cursor-pointer" type="button">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<!-- RSVP Status -->
<div class="flex flex-col gap-3">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Status RSVP</label>
<div class="grid grid-cols-2 md:grid-cols-4 gap-2">
<label class="cursor-pointer relative">
<input checked="" class="peer sr-only" name="rsvp" type="radio" value="pending"/>
<div class="p-3 text-center rounded-lg border border-outline-variant peer-checked:bg-surface-container-low peer-checked:border-primary peer-checked:text-primary text-on-surface-variant transition-all">
<span class="font-label-sm text-label-sm block mb-1">Menunggu</span>
<span class="material-symbols-outlined text-[20px]">schedule</span>
</div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="rsvp" type="radio" value="attending"/>
<div class="p-3 text-center rounded-lg border border-outline-variant peer-checked:bg-primary-container peer-checked:border-primary peer-checked:text-on-primary-container text-on-surface-variant transition-all">
<span class="font-label-sm text-label-sm block mb-1">Hadir</span>
<span class="material-symbols-outlined text-[20px]">check_circle</span>
</div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="rsvp" type="radio" value="declined"/>
<div class="p-3 text-center rounded-lg border border-outline-variant peer-checked:bg-error-container peer-checked:border-error peer-checked:text-on-error-container text-on-surface-variant transition-all">
<span class="font-label-sm text-label-sm block mb-1">Tidak Hadir</span>
<span class="material-symbols-outlined text-[20px]">cancel</span>
</div>
</label>
</div>
</div>
</form>
</div>
</main>
<!-- Bottom Action Bar (Mobile Sticky, Desktop flow) -->
<div class="fixed bottom-0 left-0 w-full glass-panel border-t border-surface-dim p-margin-mobile md:static md:bg-transparent md:border-none md:p-0 md:max-w-[600px] md:mx-auto md:pb-12 md:-mt-8 z-40">
<a class="btn-primary w-full flex items-center justify-center gap-2 rounded-full py-4 text-on-primary font-label-sm text-label-sm uppercase tracking-wider transition-transform active:scale-95 md:hover:opacity-90" href="#">
<span class="material-symbols-outlined text-[20px]">person_add</span>
            Simpan Tamu
        </a>
</div>
</body></html>
