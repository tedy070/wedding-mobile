<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--rose:#7D3C52;--rose-light:#F5D6E3;--rose-dark:#5C2A3C;--rose-mid:#C0637D;--teal:#3D7A6E;--teal-light:#E2F5F0;--teal-dark:#2A5C52;--cream:#FAF8F5;--white:#FFFFFF;--border:#E5DDD6;--border-light:#EEE8E2;--gray:#6B6460;--gray-light:#F0EBE6;--dark:#2C1A14;--pink-bg:#FDE8F2;--pink-card:#F9EEF4;--amber-bg:#FEF3E2;--amber:#8B5E1A;--success-bg:#E2F5F0;--success:#1A6B55;--danger-bg:#FFECEC;--danger:#8B2020;--bg-page:#E0D8D0;--shadow:rgba(0,0,0,.15);}
.dark{--cream:#1A1410;--white:#242018;--border:#3A3028;--border-light:#302820;--gray:#A8A098;--gray-light:#2E2820;--dark:#F0EAE0;--pink-bg:#2E1820;--pink-card:#281618;--amber-bg:#2A200A;--amber:#D4A050;--success-bg:#0E2018;--success:#4ACC8A;--danger-bg:#200A0A;--danger:#FF6B6B;--bg-page:#100C08;--rose-light:#3A1828;--teal-light:#0E2018;}
html,body{height:100%;background:var(--bg-page);transition:background .3s}
body{font-family:"DM Sans",sans-serif;color:var(--dark);overflow-x:hidden;transition:color .3s}
.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--cream);box-shadow:0 0 60px var(--shadow);transition:background .3s}
.header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px 12px;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:60;flex-shrink:0;transition:background .3s}
.brand{font-family:"Cormorant Garamond",serif;font-size:20px;color:var(--teal);font-style:italic;font-weight:600;letter-spacing:.5px}
.hicons{display:flex;gap:6px}
.hicon{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);transition:all .2s;flex-shrink:0}
.hicon:hover{background:var(--gray-light);color:var(--dark)}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;padding-bottom:10px}
.screen::-webkit-scrollbar{display:none}
.tabbar{display:flex;background:var(--white);border-top:1px solid var(--border);flex-shrink:0;transition:background .3s}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 0 10px;cursor:pointer;font-size:8px;color:var(--gray);gap:3px;border-top:2px solid transparent;transition:all .2s;letter-spacing:.2px;text-transform:uppercase;font-weight:500;user-select:none}
.tab.active{color:var(--teal);border-top-color:var(--teal)}
.tab i{font-size:18px;line-height:1}
.card{background:var(--white);border-radius:16px;padding:16px;margin:0 14px 12px;border:1px solid var(--border);transition:background .3s}
.card-sm{background:var(--white);border-radius:12px;padding:12px 14px;border:1px solid var(--border);transition:background .3s}
.grad-card{background:linear-gradient(135deg,#F9E4EE,#DFF0EB);border-radius:16px;padding:16px;margin:0 14px 12px}
.dark .grad-card{background:linear-gradient(135deg,#2E1820,#0E2018)}
.hero-banner{padding:22px 20px 18px}
.hero-banner h1{font-family:"Cormorant Garamond",serif;font-size:44px;font-weight:700;color:var(--dark);line-height:1;letter-spacing:-1px}
.hero-banner p{font-size:13px;color:var(--rose-mid);margin-top:6px}
.section-head{font-family:"Cormorant Garamond",serif;font-size:36px;font-weight:700;color:var(--dark);line-height:1.05}
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:3px}
.badge-green{background:var(--success-bg);color:var(--success)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-gray{background:var(--gray-light);color:var(--gray)}
.badge-red{background:var(--danger-bg);color:var(--danger)}
.pill-row{display:flex;gap:7px;padding:0 14px 14px;overflow-x:auto;scrollbar-width:none}
.pill-row::-webkit-scrollbar{display:none}
.pill{padding:7px 15px;border-radius:50px;border:1px solid var(--border);background:var(--white);color:var(--gray);font-size:12.5px;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:"DM Sans",sans-serif}
.pill:hover{border-color:var(--teal);color:var(--teal)}
.pill.active{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:600}
.progress-bar{height:5px;background:var(--gray-light);border-radius:5px;overflow:hidden}
.progress-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--rose),var(--teal))}
.fab{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--teal));border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;position:sticky;bottom:18px;left:calc(100% - 66px);margin-right:14px;margin-top:-26px;box-shadow:0 4px 18px rgba(93,44,60,.35);transition:transform .15s}
.fab:hover{transform:scale(1.07)}
.fab:active{transform:scale(.96)}
.field-label{font-size:10px;font-weight:600;color:var(--gray);letter-spacing:.7px;margin-bottom:4px;margin-top:15px;display:block;text-transform:uppercase}
.input-field{width:100%;border:none;border-bottom:1.5px solid var(--border);background:transparent;padding:8px 0;font-size:14px;font-family:"DM Sans",sans-serif;outline:none;color:var(--dark);transition:border-color .2s}
.input-field:focus{border-bottom-color:var(--teal)}
textarea.input-field{border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;min-height:80px;resize:none}
textarea.input-field:focus{border-color:var(--teal)}
.money-wrap{display:flex;align-items:baseline;gap:7px;border-bottom:1.5px solid var(--border);padding:4px 0;transition:border-color .2s}
.money-wrap:focus-within{border-bottom-color:var(--teal)}
.money-pfx{font-size:17px;font-weight:500;color:var(--gray);flex-shrink:0}
.money-input{border:none;background:transparent;font-size:22px;font-weight:700;font-family:"DM Sans",sans-serif;color:var(--dark);outline:none;width:100%}
.btn-primary{width:100%;background:linear-gradient(135deg,var(--rose-dark),var(--teal-dark));color:#fff;border:none;border-radius:50px;padding:14px;font-family:"DM Sans",sans-serif;font-size:14px;cursor:pointer;font-weight:600;margin-top:18px;display:flex;align-items:center;justify-content:center;gap:7px;transition:opacity .2s}
.btn-primary:hover{opacity:.9}
.btn-danger{width:100%;background:linear-gradient(135deg,#8B2020,#5C2A3C);color:#fff;border:none;border-radius:50px;padding:13px;font-family:"DM Sans",sans-serif;font-size:13.5px;cursor:pointer;font-weight:600;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-outline-danger{width:100%;border:1.5px solid #E0A0A0;background:transparent;color:var(--danger);border-radius:12px;padding:13px;font-family:"DM Sans",sans-serif;font-size:14px;cursor:pointer;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:500}
.modal-overlay{position:fixed;inset:0;background:rgba(30,15,10,.6);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.modal-overlay.open{display:flex}
.modal-sheet{background:var(--white);border-radius:24px 24px 0 0;padding:24px 20px 44px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;scrollbar-width:none;transition:background .3s}
.modal-sheet::-webkit-scrollbar{display:none}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 20px}
.modal-title{font-family:"Cormorant Garamond",serif;font-size:24px;font-weight:700;color:var(--dark);margin-bottom:2px}
.subpage{position:fixed;inset:0;background:var(--cream);z-index:100;overflow-y:auto;scrollbar-width:none;display:none;transition:background .3s}
.subpage.open{display:block}
.subpage::-webkit-scrollbar{display:none}
.back-header{display:flex;align-items:center;gap:12px;padding:14px 18px 13px;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;transition:background .3s}
.back-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);transition:all .2s;flex-shrink:0}
.doc-row{display:flex;gap:13px;align-items:flex-start;padding:14px 16px;background:var(--white);border-radius:14px;margin:0 14px 10px;border:1px solid var(--border);transition:all .2s}
.circle-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all .2s;cursor:pointer}
.vendor-img{height:110px;background:var(--gray-light);border-radius:14px;display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:12px;overflow:hidden}
.cat-tag{position:absolute;top:9px;right:9px;background:var(--rose-dark);color:#fff;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase}
.rsvp-seg{padding:12px 10px;border-radius:12px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;text-align:center;font-family:"DM Sans",sans-serif;font-size:13px;transition:all .18px}
.rsvp-seg.active{border-color:var(--rose);color:var(--rose);background:var(--pink-bg)}
.toggle-sw{width:44px;height:24px;border-radius:12px;position:relative;cursor:pointer;transition:background .22s;flex-shrink:0;border:none;padding:0}
.toggle-sw .knob{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:left .22s;box-shadow:0 1px 4px rgba(0,0,0,.22)}
.notif-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border-light)}
.notif-row:last-child{border-bottom:none}
.tx-row{display:flex;align-items:center;gap:12px;padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid var(--border-light)}
.tx-row:last-child{padding-bottom:0;margin-bottom:0;border-bottom:none}
.tx-icon{width:40px;height:40px;border-radius:12px;background:var(--gray-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--gray)}
.stat-card{border-radius:14px;padding:12px 14px;text-align:center}
.stat-num{font-size:24px;font-weight:700;line-height:1;margin-bottom:3px}
.stat-lbl{font-size:9.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.toast{position:fixed;top:72px;left:50%;transform:translateX(-50%);background:var(--dark);color:var(--cream);padding:9px 20px;border-radius:50px;font-size:13px;z-index:500;pointer-events:none;opacity:0;transition:opacity .25s;font-weight:500;white-space:nowrap;max-width:88vw;text-align:center}
.toast.show{opacity:1}
.setting-row{display:flex;align-items:center;gap:14px;padding:15px 0;border-bottom:1px solid var(--border-light);cursor:pointer}
.setting-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.couple-card{background:linear-gradient(160deg,#F9D8E8,#DFF0EB);margin:14px;border-radius:20px;padding:24px 18px;text-align:center}
.dark .couple-card{background:linear-gradient(160deg,#2E1820,#0E2018)}
.avatar{width:78px;height:78px;border-radius:50%;background:var(--white);margin:0 auto;display:flex;align-items:center;justify-content:center;border:3px solid rgba(255,255,255,.8);overflow:hidden}
.days-pill{background:rgba(255,255,255,.85);border-radius:12px;padding:10px 20px;display:inline-block;margin-top:12px}
.dark .days-pill{background:rgba(40,30,20,.85)}
.help-topic-card{background:var(--white);border-radius:14px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden}
.help-topic-head{padding:13px 16px;font-weight:600;font-size:14px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border-light)}
.help-topic-item{padding:12px 16px;font-size:13.5px;color:var(--dark);border-bottom:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.help-topic-item:last-child{border-bottom:none}
.help-topic-item:hover{background:var(--cream)}
.edit-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);flex-shrink:0;transition:all .18s}
.edit-btn:hover{background:var(--teal-light);border-color:var(--teal);color:var(--teal)}
.photo-box{border:2px dashed var(--border);border-radius:12px;overflow:hidden;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;transition:border-color .2s}
.photo-box:hover{border-color:var(--teal)}
.photo-box img{width:100%;height:100%;object-fit:cover}
.photo-overlay{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;border-radius:20px;padding:4px 10px;font-size:11px;display:flex;align-items:center;gap:4px}
.cat-picker-overlay{position:fixed;inset:0;background:rgba(30,15,10,.6);z-index:300;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.cat-picker-sheet{background:var(--cream);border-radius:24px 24px 0 0;padding:18px 16px 36px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;scrollbar-width:none}
.cat-picker-sheet::-webkit-scrollbar{display:none}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.cat-card{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:12px 11px;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;gap:7px;position:relative}
.cat-card:hover{border-color:var(--rose-mid);transform:translateY(-1px)}
.cat-card.selected{border-color:var(--rose);background:var(--pink-bg)}
.cat-card.selected::after{content:"\2713";position:absolute;top:8px;right:9px;font-size:10px;font-weight:700;color:var(--rose);background:var(--rose-light);width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.cat-icon-wrap{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center}
.cat-icon-wrap i{font-size:21px}
.cat-name{font-weight:700;font-size:13px;color:var(--dark);line-height:1.2}
.cat-sub{font-size:9.5px;font-weight:600;color:var(--gray);letter-spacing:.4px;text-transform:uppercase}
.cat-confirm-bar{position:sticky;bottom:0;background:var(--cream);padding:12px 0 0}
.cat-confirm-btn{width:100%;background:linear-gradient(135deg,var(--rose-dark),var(--teal-dark));color:#fff;border:none;border-radius:50px;padding:14px;font-family:"DM Sans",sans-serif;font-size:14px;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px}
.cat-trigger{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:11px 14px;background:var(--white);display:flex;align-items:center;gap:10px;cursor:pointer;margin-top:6px;transition:border-color .2s}
.cat-trigger:hover{border-color:var(--teal)}
.cat-trigger-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cat-trigger-icon i{font-size:17px}
.lang-picker-overlay{position:fixed;inset:0;background:rgba(30,15,10,.5);z-index:300;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.lang-picker-box{background:var(--white);border-radius:20px;padding:24px 20px;width:88%;max-width:340px}
.lang-option{display:flex;align-items:center;gap:14px;padding:14px 12px;border-radius:14px;cursor:pointer;border:2px solid var(--border);margin-bottom:10px;transition:all .2s}
.lang-option:last-child{margin-bottom:0}
.lang-option.active,.lang-option:hover{border-color:var(--teal);background:var(--teal-light)}
.lang-flag{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px}
</style>
</head>

/* ── Totals ── */
function totals(){
  const out=S.transactions.filter(t=>t.type==="out").reduce((a,t)=>a+t.amount,0);
  const xIn=S.transactions.filter(t=>t.type==="in").reduce((a,t)=>a+t.amount,0);
  const docDone=S.documents.filter(d=>d.status==="Selesai").length;
  const docPct=Math.round(docDone/Math.max(S.documents.length,1)*100);
  const totalG=S.guests.reduce((a,g)=>a+g.count,0);
  const hadir=S.guests.filter(g=>g.rsvp==="Hadir").reduce((a,g)=>a+g.count,0);
  const tunggu=S.guests.filter(g=>g.rsvp==="Menunggu").reduce((a,g)=>a+g.count,0);
  const tidakH=S.guests.filter(g=>g.rsvp==="Tidak Hadir").reduce((a,g)=>a+g.count,0);
  const sesDone=S.seserahan.filter(i=>["Siap","Sudah Dibeli","Sudah Dihias"].includes(i.status)).length;
  const sesCost=S.seserahan.reduce((a,i)=>a+i.price,0);
  const vcost=S.vendors.reduce((a,v)=>a+v.cost,0);
  return{out,xIn,saldo:S.income+xIn-out,docDone,docPct,totalG,hadir,tunggu,tidakH,sesDone,sesCost,vcost};
}

}

function initTabs(){
  ["ringkasan","anggaran","seserahan","tamu","dokumen","vendor"].forEach(name=>{
    document.getElementById("tab-"+name).addEventListener("click",function(){
      document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
      this.classList.add("active");
      ["ringkasan","anggaran","seserahan","tamu","dokumen","vendor"].forEach(p=>{
        document.getElementById("page-"+p).style.display=p===name?"block":"none";
      });
      curTab=name;renderPage(name);
    });
  });
  document.getElementById("btn-notif").addEventListener("click",()=>showToast(L("noNotif")));
  document.getElementById("btn-profile").addEventListener("click",()=>openSub("main"));
  document.getElementById("modal-overlay").addEventListener("click",function(e){if(e.target===this)closeModal();});
}

function renderPage(name){
  const el=document.getElementById("page-"+name);if(!el)return;
  const map={ringkasan:pgRingkasan,anggaran:pgAnggaran,seserahan:pgSeserahan,tamu:pgTamu,dokumen:pgDokumen,vendor:pgVendor};
  if(map[name])el.innerHTML=map[name]();
  afterRender(name);
}
function afterRender(name){
  if(name==="tamu"){
    const inp=document.getElementById("guest-search-inp");
    if(inp)inp.addEventListener("input",function(){S.guestSearch=this.value;refreshGuestList();});
    bindListEvents();
  }
  if(name==="vendor"){
    const inp=document.getElementById("vendor-search-inp");
    if(inp)inp.addEventListener("input",function(){S.vendSearch=this.value;refreshVendorList();});
    bindListEvents();
  }
  bindListEvents();
}

function bindListEvents(){
  document.querySelectorAll("[data-edit-tx]").forEach(b=>{ b.onclick=()=>openModal("tx",b.dataset.editTx); });
  document.querySelectorAll("[data-edit-ses]").forEach(b=>{ b.onclick=()=>openModal("ses",b.dataset.editSes); });
  document.querySelectorAll("[data-edit-guest]").forEach(b=>{ b.onclick=()=>openModal("guest",b.dataset.editGuest); });
  document.querySelectorAll("[data-edit-doc]").forEach(b=>{ b.onclick=()=>openModal("doc",b.dataset.editDoc); });
  document.querySelectorAll("[data-edit-vendor]").forEach(b=>{ b.onclick=()=>openModal("vendor",b.dataset.editVendor); });
  document.querySelectorAll("[data-ok-vendor]").forEach(b=>{ b.onclick=()=>{const v=S.vendors.find(x=>String(x.id)===String(b.dataset.okVendor));if(v){v.ok=!v.ok;refreshVendorList();}}; });
  document.querySelectorAll("[data-cycle-doc]").forEach(b=>{ b.onclick=()=>cycleDoc(b.dataset.cycleDoc); });
  document.querySelectorAll("[data-bud-filter]").forEach(b=>{ b.onclick=()=>{S.budFilter=b.dataset.budFilter;renderPage("anggaran");}; });
  document.querySelectorAll("[data-ses-filter]").forEach(b=>{ b.onclick=()=>{S.sesFilter=b.dataset.sesFilter;renderPage("seserahan");}; });
  const fabTx=document.getElementById("fab-tx");if(fabTx)fabTx.onclick=()=>openModal("tx",null);
  const fabSes=document.getElementById("fab-ses");if(fabSes)fabSes.onclick=()=>openModal("ses",null);
  const fabDoc=document.getElementById("fab-doc");if(fabDoc)fabDoc.onclick=()=>openModal("doc",null);
  const fabV=document.getElementById("fab-vendor");if(fabV)fabV.onclick=()=>openModal("vendor",null);
  const bAG=document.getElementById("btn-add-guest");if(bAG)bAG.onclick=()=>openModal("guest",null);
  const seeAll=document.getElementById("see-all-vendors");if(seeAll)seeAll.onclick=()=>document.getElementById("tab-vendor").click();
}

function refreshGuestList(){
  const q=S.guestSearch.toLowerCase();
  const filtered=S.guests.filter(g=>!q||g.name.toLowerCase().includes(q)||g.group.toLowerCase().includes(q));
  const el=document.getElementById("guest-list");if(el){el.innerHTML=filtered.map(guestCard).join("");bindListEvents();}
}
function refreshVendorList(){
  const q=S.vendSearch.toLowerCase();
  const filtered=S.vendors.filter(v=>!q||v.name.toLowerCase().includes(q)||v.cat.toLowerCase().includes(q));
  const el=document.getElementById("vendor-list");if(el){el.innerHTML=filtered.map(vendorCard).join("");bindListEvents();}
}
function cycleDoc(id){
  const d=S.documents.find(x=>String(x.id)===String(id));if(!d)return;
  const cy=["Belum Diurus","Sedang Diproses","Selesai"];d.status=cy[(cy.indexOf(d.status)+1)%cy.length];
  renderPage("dokumen");showToast(L("statusUpdated")+": "+d.status);
}

/* ── PAGES ── */
function pgRingkasan(){

      <button id="see-all-vendors" style="display:none"></button>
      <i class="ti ti-report-money" style="font-size:20px;color:var(--gray)"></i>
    </div>
    <div style="display:flex;gap:0;margin-bottom:11px">
      <div style="flex:1">
        <div style="font-size:9.5px;font-weight:600;color:var(--gray);letter-spacing:.6px;text-transform:uppercase;margin-bottom:3px">${L("income")}</div>
        <div style="font-size:15px;font-weight:700;color:var(--teal)">${fmt(allIn)}</div>
        <div style="font-size:10px;color:var(--gray);margin-top:2px">${S.transactions.filter(tx=>tx.type==="in").length} transaksi masuk</div>
      </div>
      <div style="flex:1">
        <div style="font-size:9.5px;font-weight:600;color:var(--gray);letter-spacing:.6px;text-transform:uppercase;margin-bottom:3px">${L("expense")}</div>
        <div style="font-size:15px;font-weight:700;color:var(--rose)">${fmt(allOut)}</div>
        <div style="font-size:10px;color:var(--gray);margin-top:2px">${S.transactions.filter(tx=>tx.type==="out").length} transaksi keluar</div>
      </div>
    </div>
    <div class="progress-bar" style="margin-bottom:10px"><div class="progress-fill" style="width:${progW}%;background:${progW>80?"var(--danger)":progW>60?"var(--amber)":"var(--teal)"}"></div></div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <div style="background:var(--teal-light);padding:6px 12px;border-radius:8px;display:inline-flex;align-items:center;gap:5px"><i class="ti ti-wallet" style="font-size:13px;color:var(--teal)"></i><span style="font-size:12px;font-weight:700;color:var(--teal)">${L("remaining")}: ${fmt(saldo)}</span></div>
      ${saldo<0?`<div style="background:var(--danger-bg);padding:6px 10px;border-radius:8px;display:inline-flex;align-items:center;gap:4px"><i class="ti ti-alert-triangle" style="font-size:12px;color:var(--danger)"></i><span style="font-size:11px;font-weight:700;color:var(--danger)">Melebihi anggaran</span></div>`:""}
    </div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px"><span style="font-weight:600;font-size:15px">${L("documents")}</span><i class="ti ti-file-check" style="font-size:20px;color:var(--gray)"></i></div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:700;color:var(--rose);line-height:1">${t.docPct}<span style="font-size:24px">%</span></div>
    <div style="font-size:12.5px;color:var(--gray);margin:5px 0 10px">${L("docCollected")} (${t.docDone}/${S.documents.length})</div>

  </div>
  <div class="card" style="background:var(--pink-card);border-color:var(--rose-light)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px"><span style="font-weight:600;font-size:15px;color:var(--rose-dark)">${L("rsvpGuests")}</span><i class="ti ti-users" style="font-size:20px;color:var(--rose-mid)"></i></div>

  </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
      <span style="font-size:13px;color:var(--gray)">${t.sesDone} / ${S.seserahan.length} ${L("itemsReady")}</span>
      <span style="font-size:13px;font-weight:700;color:var(--rose)">${sesPct}%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${sesPct}%"></div></div>
    <div style="margin-top:8px;font-size:12px;color:var(--gray)">${L("estimatedCost")}: <span style="font-weight:700;color:var(--rose-dark)">${fmt(t.sesCost)}</span></div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-weight:600;font-size:15px">${L("latestVendor")}</span><button id="see-all-vendors" style="font-size:11px;font-weight:700;color:var(--teal);background:none;border:none;cursor:pointer;letter-spacing:.4px;text-transform:uppercase;font-family:'DM Sans',sans-serif">${L("seeAll")}</button></div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <div style="background:var(--teal-light);padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;color:var(--teal);display:flex;align-items:center;gap:4px"><i class="ti ti-circle-check" style="font-size:12px"></i>${vendorOk} dikonfirmasi</div>
      <div style="background:var(--gray-light);padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;color:var(--gray)">${S.vendors.length} total vendor</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:11px">
      ${S.vendors.slice(0,2).map(v=>`<div><div style="height:80px;background:var(--gray-light);border-radius:12px;margin-bottom:7px;display:flex;align-items:center;justify-content:center;overflow:hidden">${v.photo?`<img src="${v.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:12px">`:`<i class="ti ${catIcon(v.cat)}" style="font-size:30px;color:var(--gray)"></i>`}</div><div style="font-weight:600;font-size:13px">${v.name}</div><div style="font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;margin-top:2px">${v.cat}</div></div>`).join("")}
    </div>
  </div>`;
}

function pgAnggaran(){
  const t=totals();const allIn=S.income+t.xIn;
  const txs=S.transactions.filter(tx=>S.budFilter==="semua"||(S.budFilter==="pemasukan"&&tx.type==="in")||(S.budFilter==="pengeluaran"&&tx.type==="out"));
  const groups={};txs.forEach(tx=>{const k=tx.date.substring(0,7);if(!groups[k]){const d=new Date(tx.date+"T00:00:00");groups[k]={label:d.toLocaleDateString("id-ID",{month:"long",year:"numeric"}).toUpperCase(),items:[]};}groups[k].items.push(tx);});
  const sorted=Object.keys(groups).sort((a,b)=>b.localeCompare(a)).map(k=>groups[k]);
  return `<div style="padding:18px 20px 0"><div class="section-head" style="margin-bottom:4px">${L("ledger")}</div><div style="font-size:13px;color:var(--gray);margin-bottom:14px">${L("ledgerSub")}</div></div>
  <div class="grad-card"><div style="font-size:10px;font-weight:600;color:var(--rose-mid);letter-spacing:.6px;text-transform:uppercase;margin-bottom:4px">${L("totalBalance")}</div><div style="font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;color:var(--rose-dark)">${fmt(allIn-t.out)}</div></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 14px 14px">
    <div class="card-sm" style="margin:0"><div style="font-size:10px;font-weight:600;color:var(--teal);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;gap:4px"><i class="ti ti-arrow-down" style="font-size:13px"></i>${L("totalIncome")}</div><div style="font-size:13.5px;font-weight:700">${fmt(allIn)}</div></div>
    <div class="card-sm" style="margin:0"><div style="font-size:10px;font-weight:600;color:var(--rose);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;gap:4px"><i class="ti ti-arrow-up" style="font-size:13px"></i>${L("totalExpense")}</div><div style="font-size:13.5px;font-weight:700">${fmt(t.out)}</div></div>
  </div>
  <div class="pill-row">${[["semua",L("allFilter")],["pemasukan",L("incomeFilter")],["pengeluaran",L("expenseFilter")]].map(([v,lbl])=>`<span class="pill${S.budFilter===v?" active":""}" data-bud-filter="${v}">${lbl}</span>`).join("")}</div>
  ${sorted.map(g=>`<div style="font-size:10.5px;font-weight:600;color:var(--gray);letter-spacing:.8px;padding:0 18px 8px;text-transform:uppercase">${g.label}</div>
  <div class="card">${g.items.map((tx,i)=>`<div class="tx-row" style="${i===g.items.length-1?"border-bottom:none;padding-bottom:0;margin-bottom:0":""}">
    <div class="tx-icon"><i class="ti ${catIcon(tx.cat)}"></i></div>
    <div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${tx.name}</div><div style="font-size:11.5px;color:var(--gray);margin-top:2px">${tx.cat}${tx.status?" &middot; <span class=\"badge "+sCls(tx.status)+"\"><i class=\"ti "+sIcon(tx.status)+"\" style=\"font-size:10px\"></i> "+tx.status+"</span>":""}</div></div>
    <div style="display:flex;align-items:center;gap:6px;flex-shrink:0"><div style="font-weight:700;font-size:13px;color:${tx.type==="in"?"var(--teal)":"var(--dark)"};white-space:nowrap">${tx.type==="in"?"+":"-"}${fmt(tx.amount)}</div><button class="edit-btn" data-edit-tx="${tx.id}"><i class="ti ti-pencil" style="font-size:13px"></i></button></div>
  </div>`).join("")}</div>`).join("")}
  <button class="fab" id="fab-tx"><i class="ti ti-plus" style="font-size:22px"></i></button>`;
}

function pgSeserahan(){
  const t=totals();const pct=Math.round(t.sesDone/Math.max(S.seserahan.length,1)*100);
  const items=S.seserahan.filter(i=>S.sesFilter==="Semua"||(S.sesFilter==="Pria"&&i.party==="Pria")||(S.sesFilter==="Wanita"&&i.party==="Wanita")||(S.sesFilter==="Mahar"&&i.party==="Mahar"));
  return `<div style="padding:18px 18px 0"><div class="section-head" style="margin-bottom:4px">${L("seserahanTitle")}</div><div style="font-size:13px;color:var(--gray);margin-bottom:12px">${L("seserahanSub")}</div></div>
  <div class="card"><div style="font-size:10px;font-weight:600;color:var(--gray);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px">${L("overallProgress")}</div><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-weight:600;font-size:14px">${t.sesDone} / ${S.seserahan.length} ${L("itemsReady")}</span><span style="font-size:13px;color:var(--gray)">${pct}%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>
  <div class="grad-card"><div style="font-size:10px;font-weight:600;color:var(--rose-mid);letter-spacing:.6px;text-transform:uppercase;margin-bottom:4px">${L("estimatedCost")}</div><div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--rose-dark);margin-top:2px">${fmt(t.sesCost)}</div><div style="font-size:12.5px;color:var(--teal);margin-top:5px;display:flex;align-items:center;gap:4px"><i class="ti ti-circle-check" style="font-size:14px"></i>${L("withinBudget")}</div></div>
  <div class="pill-row">${[[L("allParty"),"Semua"],[L("male"),"Pria"],[L("female"),"Wanita"],[L("dowry"),"Mahar"]].map(([lbl,v])=>`<span class="pill${S.sesFilter===v?" active":""}" data-ses-filter="${v}">${lbl}</span>`).join("")}</div>
  ${items.map(item=>`<div class="card"><div style="display:flex;gap:12px"><div style="width:48px;height:48px;border-radius:13px;background:var(--gray-light);display:flex;align-items:center;justify-content:center;color:var(--gray);flex-shrink:0"><i class="ti ${catIcon(item.cat)}" style="font-size:22px"></i></div><div style="flex:1;min-width:0"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px"><div style="font-weight:600;font-size:14px">${item.name}</div><span class="badge ${sCls(item.status)}" style="flex-shrink:0"><i class="ti ${sIcon(item.status)}" style="font-size:10px"></i> ${item.status}</span></div><div style="font-size:12px;color:var(--gray);margin-top:2px">${item.cat} &middot; ${item.party}</div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px"><div style="font-size:13px;font-weight:700;color:var(--rose)">${fmt(item.price)}</div><button class="edit-btn" data-edit-ses="${item.id}"><i class="ti ti-pencil" style="font-size:13px"></i></button></div></div></div></div>`).join("")}
  <button class="fab" id="fab-ses"><i class="ti ti-plus" style="font-size:22px"></i></button>`;
}

function pgDokumen(){
  const t=totals();

  ${S.documents.map(d=>`<div class="doc-row" style="${d.status==="Sedang Diproses"?"background:var(--pink-bg);border-color:var(--rose-light)":""}">

/* ── MODAL ── */
function openModal(type,id){
  const ov=document.getElementById("modal-overlay");
  const mc=document.getElementById("modal-content");
  ov.classList.add("open");
  const builders={tx:buildTxForm,ses:buildSesForm,guest:buildGuestForm,doc:buildDocForm,vendor:buildVendorForm};
  mc.innerHTML="<div class=\"modal-handle\"></div>"+(builders[type]?builders[type](id):"");
  setTimeout(()=>{
    ["m-tx-amt","m-ses-price","m-v-cost"].forEach(id=>bindMoney(id));
    bindModalEvents(type,id);
  },30);
}
function closeModal(){document.getElementById("modal-overlay").classList.remove("open");}

function bindModalEvents(type,id){
  const mc=document.getElementById("modal-content");
  const cl=mc.querySelector("#modal-close");if(cl)cl.onclick=closeModal;
  mc.querySelectorAll("[data-cat-ctx]").forEach(btn=>{
    btn.onclick=()=>{
      const ctx=btn.dataset.catCtx;
      const hid=document.getElementById("cat-hid-"+ctx);
      openCatPicker(hid?hid.value:"",v=>{
        if(hid)hid.value=v;updateCatTrigger(ctx,v);
      });
    };
  });
  const delBtn=mc.querySelector("[data-del]");if(delBtn)delBtn.onclick=()=>delItem(delBtn.dataset.del,id);
  const savBtn=mc.querySelector("[data-save]");if(savBtn)savBtn.onclick=()=>{
    const saves={tx:saveTx,ses:saveSes,guest:saveGuest,doc:saveDoc,vendor:saveVendor};
    if(saves[savBtn.dataset.save])saves[savBtn.dataset.save](id);
  };
  mc.querySelectorAll("[data-tx-type]").forEach(p=>{p.onclick=()=>{txType=p.dataset.txType;mc.querySelectorAll("[data-tx-type]").forEach(x=>x.classList.toggle("active",x===p));};});
  mc.querySelectorAll("[data-tx-st]").forEach(p=>{p.onclick=()=>{txStatus=p.dataset.txSt;mc.querySelectorAll("[data-tx-st]").forEach(x=>x.classList.toggle("active",x===p));};});
  mc.querySelectorAll("[data-ses-party]").forEach(p=>{p.onclick=()=>{sesParty=p.dataset.sesParty;mc.querySelectorAll("[data-ses-party]").forEach(x=>x.classList.toggle("active",x===p));};});
  mc.querySelectorAll("[data-ses-st]").forEach(p=>{p.onclick=()=>{sesStatus=p.dataset.sesSt;mc.querySelectorAll("[data-ses-st]").forEach(x=>x.classList.toggle("active",x===p));};});
  mc.querySelectorAll("[data-g-group]").forEach(p=>{p.onclick=()=>{gGroup=p.dataset.gGroup;mc.querySelectorAll("[data-g-group]").forEach(x=>x.classList.toggle("active",x===p));};});
  mc.querySelectorAll("[data-g-rsvp]").forEach(p=>{p.onclick=()=>{gRsvp=p.dataset.gRsvp;mc.querySelectorAll("[data-g-rsvp]").forEach(x=>x.classList.toggle("active",x===p));};});
  mc.querySelectorAll("[data-g-vip]").forEach(p=>{p.onclick=()=>{gVip=p.dataset.gVip==="true";mc.querySelectorAll("[data-g-vip]").forEach(x=>x.classList.toggle("active",x===p));};});
  const minus=mc.querySelector("#g-cnt-minus");const plus=mc.querySelector("#g-cnt-plus");const disp=mc.querySelector("#g-cnt-disp");
  if(minus)minus.onclick=()=>{if(gCount>1){gCount--;if(disp)disp.textContent=gCount;}};
  if(plus)plus.onclick=()=>{gCount++;if(disp)disp.textContent=gCount;};
  mc.querySelectorAll("[data-doc-st]").forEach(p=>{p.onclick=()=>{docSt=p.dataset.docSt;mc.querySelectorAll("[data-doc-st]").forEach(x=>x.classList.toggle("active",x===p));};});
  mc.querySelectorAll("[data-v-ok]").forEach(p=>{p.onclick=()=>{vOk=p.dataset.vOk==="true";mc.querySelectorAll("[data-v-ok]").forEach(x=>x.classList.toggle("active",x===p));};});
  mc.querySelectorAll("[data-theme]").forEach(p=>{p.onclick=()=>{selTheme=p.dataset.theme;mc.querySelectorAll("[data-theme]").forEach(x=>x.classList.toggle("active",x===p));};});
  const vpBtn=mc.querySelector("#vendor-photo-btn");
  if(vpBtn)vpBtn.onclick=()=>pickPhoto(d=>{
    vendorPhoto=d;
    const prev=mc.querySelector("#vendor-photo-preview");
    if(prev){prev.innerHTML="";const img=document.createElement("img");img.src=d;img.style.cssText="width:100%;height:100%;object-fit:cover;border-radius:10px";prev.appendChild(img);}
    const ov2=mc.querySelector("#vendor-photo-overlay");if(ov2){ov2.style.display="flex";ov2.textContent=L("changePhoto");}
  });
}

function delItem(type,id){
  if(!confirm(L("itemDeleted")+"?"))return;
  const map={tx:"transactions",ses:"seserahan",guest:"guests",doc:"documents",vendor:"vendors"};
  if(map[type])S[map[type]]=S[map[type]].filter(x=>String(x.id)!==String(id));
  closeModal();renderPage(curTab);showToast(L("itemDeleted"));
}

/* ── CAT PICKER ── */
function openCatPicker(currentCat,cb){
  pickerSel=currentCat||"";pickerCb=cb;
  if(document.getElementById("cat-picker"))return;
  const overlay=document.createElement("div");overlay.className="cat-picker-overlay";overlay.id="cat-picker";
  const sheet=document.createElement("div");sheet.className="cat-picker-sheet";

  const hdr=document.createElement("div");hdr.style.cssText="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px";
  const ttl=document.createElement("div");
  ttl.innerHTML="<div style=\"font-size:10px;font-weight:700;color:var(--teal);letter-spacing:.8px;text-transform:uppercase;display:flex;align-items:center;gap:6px\"><i class=\"ti ti-layout-grid-add\" style=\"font-size:14px\"></i>"+L("pickCategory")+"</div><div style=\"font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:var(--dark);margin-top:2px\">"+L("pickCategory")+"</div><div style=\"font-size:12.5px;color:var(--gray);margin-top:2px\">"+L("pickCategorySub")+"</div>";
  const xBtn=document.createElement("button");xBtn.className="hicon";xBtn.innerHTML="<i class=\"ti ti-x\"></i>";xBtn.onclick=()=>overlay.remove();
  hdr.appendChild(ttl);hdr.appendChild(xBtn);

  const grid=document.createElement("div");grid.className="cat-grid";
  const lbl=document.createElement("div");lbl.style.cssText="text-align:center;font-size:10.5px;color:var(--gray);letter-spacing:.5px;text-transform:uppercase;margin-top:8px";lbl.textContent=pickerSel?pickerSel.toUpperCase():L("noneSelected");

  CATS.forEach(c=>{
    const card=document.createElement("div");card.className="cat-card"+(pickerSel===c.id?" selected":"");
    card.innerHTML="<div class=\"cat-icon-wrap\" style=\"background:"+c.bg+"\"><i class=\"ti "+c.icon+"\" style=\"color:"+c.ic+"\"></i></div><div><div class=\"cat-name\">"+c.name+"</div><div class=\"cat-sub\">"+c.sub+"</div></div>";
    card.onclick=()=>{pickerSel=c.id;grid.querySelectorAll(".cat-card").forEach(x=>x.classList.remove("selected"));card.classList.add("selected");lbl.textContent=c.id.toUpperCase();};
    grid.appendChild(card);
  });

  const bar=document.createElement("div");bar.className="cat-confirm-bar";
  const confirmBtn=document.createElement("button");confirmBtn.className="cat-confirm-btn";
  confirmBtn.innerHTML="<i class=\"ti ti-circle-check\" style=\"font-size:17px\"></i>"+L("confirmPick")+" &rarr;";
  confirmBtn.onclick=()=>{if(!pickerSel){showToast(L("pickCatFirst"));return;}if(pickerCb)pickerCb(pickerSel);overlay.remove();};
  bar.appendChild(confirmBtn);bar.appendChild(lbl);

  sheet.appendChild(hdr);sheet.appendChild(grid);sheet.appendChild(bar);
  overlay.appendChild(sheet);overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};
  document.body.appendChild(overlay);
}

function catTriggerHTML(ctx,currentCat){
  const m=currentCat?getCat(currentCat):null;
  return "<input type=\"hidden\" id=\"cat-hid-"+ctx+"\" value=\""+(currentCat||"")+"\">"
    +"<button type=\"button\" class=\"cat-trigger\" data-cat-ctx=\""+ctx+"\">"
    +"<div class=\"cat-trigger-icon\" id=\"cat-icon-"+ctx+"\" style=\"background:"+(m?m.bg:"var(--gray-light)")+"\"><i class=\"ti "+(m?m.icon:"ti-layout-grid-add")+"\" style=\"color:"+(m?m.ic:"var(--gray)")+"\"></i></div>"
    +"<div style=\"flex:1;text-align:left\"><div id=\"cat-name-"+ctx+"\" style=\"font-size:14px;font-weight:600;color:var(--dark)\">"+(m?m.name:L("pickCategory"))+"</div>"
    +"<div id=\"cat-hint-"+ctx+"\" style=\"font-size:11px;color:var(--gray);margin-top:1px\">"+(m?m.sub:"Tap untuk memilih kategori")+"</div></div>"
    +"<i class=\"ti ti-chevron-right\" style=\"font-size:15px;color:var(--gray)\"></i></button>";
}
function updateCatTrigger(ctx,catId){
  const m=getCat(catId);
  const ico=document.getElementById("cat-icon-"+ctx);if(ico){ico.style.background=m.bg;ico.innerHTML="<i class=\"ti "+m.icon+"\" style=\"color:"+m.ic+"\"></i>";}
  const nm=document.getElementById("cat-name-"+ctx);if(nm)nm.textContent=m.name;
  const hn=document.getElementById("cat-hint-"+ctx);if(hn)hn.textContent=m.sub;
  const hid=document.getElementById("cat-hid-"+ctx);if(hid)hid.value=catId;
}

/* ── FORM BUILDERS ── */
function pillRow(items,attr,cur){return items.map(([v,lbl])=>`<span class="pill${cur===v?" active":""}" ${attr}="${v}">${lbl}</span>`).join("");}

function buildTxForm(id){
  const ex=id?S.transactions.find(x=>String(x.id)===String(id)):null;
  if(ex){txType=ex.type;txStatus=ex.status||"Belum Dibayar";}else{txType="out";txStatus="Belum Dibayar";}
  const isEdit=!!ex;
  const payStatuses=[["Belum Dibayar",L("notUnpaid")],["DP",L("dp")],["Lunas",L("paid")],["Tabungan","Tabungan"]];
  return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><div class="modal-title">${isEdit?L("editBudget"):L("addBudget")}</div><button class="hicon" id="modal-close"><i class="ti ti-x"></i></button></div>
<span class="field-label">${L("transactionType")}</span>
<div style="display:flex;gap:8px;margin-bottom:4px">${pillRow([["out","<i class=\"ti ti-arrow-up\" style=\"font-size:12px\"></i> "+L("expenseOut")],["in","<i class=\"ti ti-arrow-down\" style=\"font-size:12px\"></i> "+L("incomeIn")]],"data-tx-type",txType)}</div>
<span class="field-label">${L("nominal")}</span>
<div class="money-wrap"><span class="money-pfx">Rp</span><input id="m-tx-amt" class="money-input" inputmode="numeric" placeholder="0" value="${ex?fmtN(ex.amount):""}"></div>
<span class="field-label">${L("itemName")}</span>
<input id="m-tx-name" class="input-field" placeholder="Contoh: DP Gedung" value="${ex?ex.name:""}">
<span class="field-label">${L("category")}</span>${catTriggerHTML("tx",ex?ex.cat:"")}
<span class="field-label">${L("paymentStatus")}</span>
<div style="display:flex;gap:8px;flex-wrap:wrap">${pillRow(payStatuses,"data-tx-st",txStatus)}</div>
<span class="field-label">${L("notes")}</span>
<input id="m-tx-notes" class="input-field" placeholder="${L("notesPh")}" value="${ex&&ex.notes?ex.notes:""}">
${isEdit?`<button class="btn-danger" data-del="tx"><i class="ti ti-trash" style="font-size:15px"></i>${L("deleteBudget")}</button>`:""}
<button class="btn-primary" data-save="tx"><i class="ti ti-device-floppy" style="font-size:15px"></i>${isEdit?L("updateBudget"):L("saveBudget")}</button>`;
}
function saveTx(id){
  const name=(document.getElementById("m-tx-name").value||"").trim();
  const amt=moneyVal("m-tx-amt");
  if(!name||!amt){showToast(L("fillRequired"));return;}
  const cat=(document.getElementById("cat-hid-tx")||{}).value||"Lain-Lain";
  const notes=(document.getElementById("m-tx-notes").value||"");
  if(id){const tx=S.transactions.find(x=>String(x.id)===String(id));if(tx)Object.assign(tx,{name,cat,type:txType,amount:amt,status:txStatus,notes});showToast(L("budgetUpdated"));}
  else{S.transactions.unshift({id:Date.now(),name,cat,type:txType,amount:amt,status:txStatus,notes,date:new Date().toISOString().split("T")[0]});showToast(L("budgetAdded"));}
  closeModal();renderPage("anggaran");
}

function saveSes(id){

function openSub(sub){
  const sp=document.getElementById("subpage-container");
  sp.classList.add("open");
  const pages={main:subMain,detail:subDetail,security:subSecurity,notif:subNotif,bantuan:subBantuan};
  sp.innerHTML=pages[sub]?pages[sub]():"";

function closeSub(){document.getElementById("subpage-container").classList.remove("open");}

function initSubEvents(sub){
  const sp=document.getElementById("subpage-container");
  sp.querySelectorAll("[data-sub]").forEach(el=>el.onclick=()=>openSub(el.dataset.sub));
  sp.querySelectorAll("[data-sub-back]").forEach(b=>b.onclick=()=>openSub(b.dataset.subBack||"main"));
  const lo=sp.querySelector("#sub-logout");if(lo)lo.onclick=closeSub;
  if(sub==="main"){
    const dm=sp.querySelector("#dm-toggle");
    if(dm)dm.onclick=function(){S.darkMode=!S.darkMode;this.style.background=S.darkMode?"var(--teal)":"var(--border)";this.querySelector(".knob").style.left=S.darkMode?"23px":"3px";applyDark();showToast(S.darkMode?L("darkOn"):L("darkOff"));};
    const pp=sp.querySelector("#profile-photo-btn");
    if(pp)pp.onclick=()=>pickPhoto(d=>{S.profilePhoto=d;openSub("main");showToast(L("photoSaved"));});
    const lb=sp.querySelector("#lang-btn");if(lb)lb.onclick=openLangPicker;
  }
  if(sub==="detail"){
    const cb=sp.querySelector("#cover-photo-btn");
    if(cb)cb.onclick=()=>pickPhoto(d=>{
      S.coverPhoto=d;
      /* Update preview di subDetail */
      const prev=sp.querySelector("#cover-photo-preview");
      if(prev){
        prev.innerHTML="";
        const img=document.createElement("img");img.src=d;img.style.cssText="width:100%;height:100%;object-fit:cover;border-radius:14px";prev.appendChild(img);
        const ov2=document.createElement("div");ov2.className="photo-overlay";ov2.textContent=L("changeCover");prev.appendChild(ov2);
      }
      /* Langsung sync cover ke Firestore */
      syncSettings();
    });
    sp.querySelectorAll("[data-theme]").forEach(p=>p.onclick=()=>{selTheme=p.dataset.theme;sp.querySelectorAll("[data-theme]").forEach(x=>x.classList.toggle("active",x===p));});
    const sv=sp.querySelector("#save-detail-btn");if(sv)sv.onclick=saveDetail;
  }
  if(sub==="security"){
    const dm2=sp.querySelector(".toggle-sw");
    if(dm2)dm2.onclick=function(){const on=this.style.background.includes("teal");this.style.background=on?"var(--border)":"var(--teal)";this.querySelector(".knob").style.left=on?"3px":"23px";showToast(on?L("twoFAOff"):L("twoFAOn"));};
    const sp2=sp.querySelector("#save-pass-btn");
    if(sp2)sp2.onclick=async function(){
      const curInp=sp.querySelector("#pass-current");
      const newInp=sp.querySelector("#pass-new");
      const cfmInp=sp.querySelector("#pass-confirm");
      const cur=(curInp.value||"").trim();
      const nw=(newInp.value||"").trim();
      const cfm=(cfmInp.value||"").trim();
      if(!cur||!nw||!cfm){showToast("Semua field wajib diisi");return;}
      if(nw.length<6){showToast("Kata sandi baru minimal 6 karakter");return;}
      if(nw!==cfm){showToast("Konfirmasi kata sandi tidak cocok");return;}
      if(!_fbReady||!_auth||!_auth.currentUser){showToast("Tidak terhubung ke akun");return;}
      sp2.textContent="Menyimpan...";sp2.disabled=true;
      try{
        /* Re-authenticate dulu dengan kata sandi lama */
        const cred=_AU.credential(_auth.currentUser.email,cur);
        await _AU.reauthenticate(_auth.currentUser,cred);
        /* Update password */
        await _AU.updatePassword(_auth.currentUser,nw);
        /* Kosongkan form */
        curInp.value="";newInp.value="";cfmInp.value="";
        /* Reset eye icons ke password mode */
        sp.querySelectorAll(".pass-eye-btn").forEach(btn=>{
          const target=sp.querySelector("#"+btn.dataset.target);
          if(target)target.type="password";
          btn.innerHTML='<i class="ti ti-eye" style="font-size:16px"></i>';
          btn.style.color="var(--gray)";
        });
        showToast(L("passUpdated"));
      }catch(e){
        const ERR={"auth/wrong-password":"Kata sandi saat ini salah","auth/invalid-credential":"Kata sandi saat ini salah","auth/too-many-requests":"Terlalu banyak percobaan, coba lagi nanti","auth/weak-password":"Kata sandi baru terlalu lemah"};
        showToast(ERR[e.code]||("Gagal: "+e.message));
      }finally{sp2.textContent=L("saveChanges");sp2.disabled=false;}
    };
    sp.querySelectorAll("[data-logout-dev]").forEach(b=>b.onclick=()=>showToast(L("deviceLogout")));
    sp.querySelectorAll(".pass-eye-btn").forEach(btn=>{
      btn.onclick=function(){
        const inp=sp.querySelector("#"+this.dataset.target);
        if(!inp)return;
        const show=inp.type==="password";
        inp.type=show?"text":"password";
        this.innerHTML=show?"<i class=\"ti ti-eye-off\" style=\"font-size:16px\"></i>":"<i class=\"ti ti-eye\" style=\"font-size:16px\"></i>";
        this.style.color=show?"var(--teal)":"var(--gray)";
      };
    });
  }
  if(sub==="notif"){
    sp.querySelectorAll(".toggle-sw[data-notif-key]").forEach(sw=>sw.onclick=function(){const k=this.dataset.notifKey;S.notif[k]=!S.notif[k];this.style.background=S.notif[k]?"var(--rose)":"var(--border)";this.querySelector(".knob").style.left=S.notif[k]?"23px":"3px";});
  }
  if(sub==="bantuan"){
    sp.querySelectorAll("[data-help-item]").forEach(el=>el.onclick=()=>showToast(el.dataset.helpItem));
    const wa=sp.querySelector("#btn-wa");if(wa)wa.onclick=()=>showToast(L("chatAdmin"));
    const vd=sp.querySelector("#btn-video");if(vd)vd.onclick=()=>showToast(L("videoTutorial"));
  }
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   FIREBASE STATE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let _db=null,_auth=null,_uid=null,_fbReady=false,_FS=null,_AU=null;
let _rtdb=null,_RD=null,_rtdbReady=false; /* Realtime Database */
const rtPath=(path)=>`users/${_uid}/${path}`;

/* userDocRef & userColRef tidak digunakan — collections hanya ke RTDB */

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   COLLECTIONS → RTDB ONLY
   META/SETTINGS → FIRESTORE ONLY
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
async function fbSave(col,item){
  /* Data collections (tx, tamu, vendor, dll) HANYA ke RTDB */
  if(!_rtdbReady||!_RD||!_uid)return;
  try{
    const clean=JSON.parse(JSON.stringify({...item,id:String(item.id),_t:Date.now()}));
    const ref=_RD.ref(_rtdb,rtPath(`${col}/${String(item.id)}`));
    await _RD.set(ref,clean);
    showSyncBadge();
  }catch(e){console.error("RTDB save",col,e.message);}
}

async function fbDelete(col,id){
  /* Hapus collection item HANYA dari RTDB */
  if(!_rtdbReady||!_RD||!_uid)return;
  try{
    const ref=_RD.ref(_rtdb,rtPath(`${col}/${String(id)}`));
    await _RD.remove(ref);
    showSyncBadge();
  }catch(e){console.error("RTDB delete",col,e.message);}
}

async function fbSaveMeta(docId,data){
  /* Profil & settings HANYA disimpan ke Firestore (bukan RTDB) */
  if(!_fbReady||!_FS||!_uid)return;
  try{
    const clean=JSON.parse(JSON.stringify({...data,_t:Date.now()}));
    await _FS.setDoc(_FS.doc(_db,"users",_uid,"meta",docId),clean);
    showSyncBadge();
  }catch(e){console.error("FS meta",docId,e.message);}
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   LOAD DATA
   • Firestore → meta/settings, meta/notif
   • RTDB      → semua collections
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
async function loadFromRTDB(){
  if(!_rtdbReady||!_RD||!_uid)return false;
  try{
    const snap=await _RD.get(_RD.ref(_rtdb,`users/${_uid}`));
    if(!snap.exists())return false;
    const d=snap.val();
    /* Meta/settings & notif TIDAK diload dari RTDB — hanya dari Firestore */
    /* collections */
    const cols=["transactions","seserahan","guests","documents","vendors"];
    cols.forEach(col=>{
      if(d[col]){
        const items=Object.values(d[col]).map(it=>{const c={...it};delete c._t;return c;});
        if(col==="transactions")items.sort((a,b)=>String(b.id).localeCompare(String(a.id)));
        S[col]=items;
      }
    });
    return true;
  }catch(e){console.error("loadFromRTDB",e.message);return false;}
}

async function loadFromFirestore(){
  /* Firestore HANYA untuk meta: settings & notif */
  if(!_fbReady||!_FS||!_uid)return;
  try{
    const settSnap=await _FS.getDoc(_FS.doc(_db,"users",_uid,"meta","settings"));
    if(settSnap.exists()){
      const d=settSnap.data();
      if(d.couple)Object.assign(S.couple,d.couple);
      if(d.income!=null)S.income=d.income;
      if(d.lang)S.lang=d.lang;
      if(d.darkMode!=null)S.darkMode=d.darkMode;
      if(d.profilePhoto)S.profilePhoto=d.profilePhoto;
      if(d.coverPhoto)S.coverPhoto=d.coverPhoto;
    }
    const notifSnap=await _FS.getDoc(_FS.doc(_db,"users",_uid,"meta","notif"));
    if(notifSnap.exists())Object.assign(S.notif,notifSnap.data());
    /* Collections tidak dibaca dari Firestore — semua dari RTDB */
  }catch(e){console.error("loadFromFirestore",e.message);}
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   REALTIME LISTENER (live sync antar perangkat)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let _rtListener=null;
function startRTDBListener(){
  if(!_rtdbReady||!_RD||!_uid)return;
  if(_rtListener)_rtListener();
  const ref=_RD.ref(_rtdb,`users/${_uid}`);
  _rtListener=()=>_RD.off(ref);
  _RD.onValue(ref,snap=>{
    if(!snap.exists())return;
    const d=snap.val();
    let changed=false;
    /* Update collections if remote is newer */
    const cols=["transactions","seserahan","guests","documents","vendors"];
    cols.forEach(col=>{
      if(d[col]){
        const items=Object.values(d[col]).map(it=>{const c={...it};delete c._t;return c;});
        if(col==="transactions")items.sort((a,b)=>String(b.id).localeCompare(String(a.id)));
        const localStr=JSON.stringify(S[col]);
        const remoteStr=JSON.stringify(items);
        if(localStr!==remoteStr){S[col]=items;changed=true;}
      }
    });
    if(changed){renderPage(curTab);showSyncBadge();}
  });
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SYNC HELPERS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
async function syncTx(id){
  const t=id?S.transactions.find(x=>String(x.id)===String(id)):S.transactions[0];
  if(t)await fbSave("transactions",t);
}
async function syncSes(id){
  const t=id?S.seserahan.find(x=>String(x.id)===String(id)):S.seserahan[S.seserahan.length-1];
  if(t)await fbSave("seserahan",t);
}
async function syncGuest(id){
  const t=id?S.guests.find(x=>String(x.id)===String(id)):S.guests[S.guests.length-1];
  if(t)await fbSave("guests",t);
}
async function syncDoc(id){
  const t=id?S.documents.find(x=>String(x.id)===String(id)):S.documents[S.documents.length-1];
  if(t)await fbSave("documents",t);
}
async function syncVendor(id){
  const t=id?S.vendors.find(x=>String(x.id)===String(id)):S.vendors[S.vendors.length-1];
  if(t)await fbSave("vendors",t);
}
async function syncSettings(){await fbSaveMeta("settings",{couple:S.couple,income:S.income,lang:S.lang,darkMode:S.darkMode,profilePhoto:S.profilePhoto||null,coverPhoto:S.coverPhoto||null});}
async function syncNotif(){await fbSaveMeta("notif",{...S.notif});}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   FIREBASE INIT (Firestore + Auth + RTDB)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
async function initFirebase(){
  try{
    const {initializeApp}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const fb=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const au=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
    const rd=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");

    const app=initializeApp(FB_CONFIG);
    _db=fb.getFirestore(app);
    _auth=au.getAuth(app);
    /* Realtime Database */
    _rtdb=rd.getDatabase(app);
    _RD={ref:rd.ref,set:rd.set,get:rd.get,remove:rd.remove,onValue:rd.onValue,off:rd.off};
    _rtdbReady=true;

    _FS={doc:fb.doc,setDoc:fb.setDoc,getDoc:fb.getDoc,collection:fb.collection,getDocs:fb.getDocs,deleteDoc:fb.deleteDoc};
    _AU={signIn:au.signInWithEmailAndPassword,register:au.createUserWithEmailAndPassword,signOut:au.signOut,onAuthStateChanged:au.onAuthStateChanged,credential:(email,pass)=>au.EmailAuthProvider.credential(email,pass),reauthenticate:au.reauthenticateWithCredential,updatePassword:au.updatePassword};
    _fbReady=true;

    _AU.onAuthStateChanged(_auth,async user=>{
      if(user){
        _uid=user.uid;
        showLoadingOverlay("Memuat data...");
        /* Settings/profil SELALU dari Firestore, collections dari RTDB (lebih cepat) */
        await loadFromFirestore(); /* settings, notif — Firestore only */
        await loadFromRTDB();     /* collections (tx, tamu, dll) — RTDB */
        startRTDBListener();      /* live sync untuk collections */
        hideLoadingOverlay();
        launchApp();
      }else{
        _uid=null;
        if(_rtListener){_rtListener();_rtListener=null;}
        showLoginScreen();
      }
    });
  }catch(e){
    console.warn("Firebase tidak tersedia, mode lokal:",e.message);
    _fbReady=false;_rtdbReady=false;
    launchApp();
  }
}

/* ── Sync badge ── */
let _syncTmr=null;
function showSyncBadge(mode){
  let b=document.getElementById("sync-badge");
  if(!b){b=document.createElement("div");b.id="sync-badge";b.style.cssText="position:fixed;top:70px;right:14px;background:var(--teal);color:#fff;border-radius:20px;padding:5px 12px;font-size:11.5px;font-weight:600;display:flex;align-items:center;gap:5px;z-index:400;opacity:0;transition:opacity .3s;pointer-events:none";document.body.appendChild(b);}
  const hasRTDB=_rtdbReady;
  b.innerHTML=(hasRTDB?'<i class="ti ti-cloud-check" style="font-size:13px"></i> Tersimpan':'<i class="ti ti-device-floppy" style="font-size:13px"></i> Tersimpan lokal');
  b.style.background=hasRTDB?"var(--teal)":"var(--rose-mid)";
  b.style.opacity="1";clearTimeout(_syncTmr);_syncTmr=setTimeout(()=>b.style.opacity="0",2800);
}

/* ── Loading overlay ── */
function showLoadingOverlay(msg){
  let el=document.getElementById("fb-loading");
  if(!el){
    el=document.createElement("div");el.id="fb-loading";
    el.style.cssText="position:fixed;inset:0;background:#FAF8F5;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;font-family:'DM Sans',sans-serif";
    el.innerHTML="<style>@keyframes fbs{to{transform:rotate(360deg)}}</style><div style=\"width:48px;height:48px;border-radius:50%;border:4px solid #F5D6E3;border-top-color:#7D3C52;animation:fbs .8s linear infinite\"></div><div id=\"fb-lm\" style=\"font-size:14px;color:#6B6460;font-weight:500\">"+msg+"</div>";
    document.body.appendChild(el);
  }else{const m=document.getElementById("fb-lm");if(m)m.textContent=msg;el.style.display="flex";}
}
function hideLoadingOverlay(){const el=document.getElementById("fb-loading");if(el)el.style.display="none";}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   LOGIN SCREEN
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let _fbMode="login";

function showLoginScreen(){
  hideLoadingOverlay();
  const app=document.getElementById("app-root");if(app)app.style.display="none";
  let scr=document.getElementById("fb-login");if(scr)scr.remove();
  scr=document.createElement("div");scr.id="fb-login";
  scr.style.cssText="position:fixed;inset:0;background:linear-gradient(160deg,#F9D8E8,#DFF0EB);display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;padding:20px;z-index:998";

  // Build login HTML safely
  const wrapper=document.createElement("div");
  wrapper.style.cssText="background:#fff;border-radius:24px;padding:28px 22px;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(0,0,0,.12)";

  wrapper.innerHTML=""
    +"<div style='text-align:center;margin-bottom:24px'>"
    +"<div style='font-family:Cormorant Garamond,serif;font-size:30px;color:#3D7A6E;font-style:italic;font-weight:600'>Wedding Planner</div>"
    +"<div style='font-size:12.5px;color:#6B6460;margin-top:4px'>by Tedi & Nadya</div>"
    +"</div>"
    +"<div id='fb-tabs' style='display:flex;background:#F0EBE6;border-radius:12px;padding:3px;margin-bottom:20px'>"
    +"<button id='fb-tl' style='flex:1;padding:9px;border:none;border-radius:9px;font-family:DM Sans,sans-serif;font-size:13.5px;font-weight:600;cursor:pointer;background:#fff;color:#2C1A14;box-shadow:0 1px 3px rgba(0,0,0,.1)'>Masuk</button>"
    +"<button id='fb-tr' style='flex:1;padding:9px;border:none;border-radius:9px;font-family:DM Sans,sans-serif;font-size:13.5px;font-weight:600;cursor:pointer;background:transparent;color:#6B6460'>Daftar</button>"
    +"</div>"
    +"<div id='fb-rx' style='display:none'>"
    +"<input id='fb-p1' placeholder='Nama Partner 1' style='width:100%;border:1.5px solid #E5DDD6;border-radius:10px;padding:10px 13px;font-family:DM Sans,sans-serif;font-size:14px;outline:none;color:#2C1A14;margin-bottom:8px;box-sizing:border-box'>"
    +"<input id='fb-p2' placeholder='Nama Partner 2' style='width:100%;border:1.5px solid #E5DDD6;border-radius:10px;padding:10px 13px;font-family:DM Sans,sans-serif;font-size:14px;outline:none;color:#2C1A14;margin-bottom:8px;box-sizing:border-box'>"
    +"<input id='fb-wd' type='date' style='width:100%;border:1.5px solid #E5DDD6;border-radius:10px;padding:10px 13px;font-family:DM Sans,sans-serif;font-size:14px;outline:none;color:#2C1A14;margin-bottom:8px;box-sizing:border-box'>"
    +"</div>"
    +"<label style='font-size:10px;font-weight:600;color:#6B6460;letter-spacing:.7px;text-transform:uppercase;display:block;margin-bottom:4px'>EMAIL</label>"
    +"<input id='fb-em' type='email' placeholder='email@contoh.com' style='width:100%;border:1.5px solid #E5DDD6;border-radius:10px;padding:10px 13px;font-family:DM Sans,sans-serif;font-size:14px;outline:none;color:#2C1A14;margin-bottom:10px;box-sizing:border-box'>"
    +"<label style='font-size:10px;font-weight:600;color:#6B6460;letter-spacing:.7px;text-transform:uppercase;display:block;margin-bottom:4px'>KATA SANDI</label>"
    +"<div style='position:relative;margin-bottom:16px'>"
    +"<input id='fb-pw' type='password' placeholder='Min. 6 karakter' style='width:100%;border:1.5px solid #E5DDD6;border-radius:10px;padding:10px 40px 10px 13px;font-family:DM Sans,sans-serif;font-size:14px;outline:none;color:#2C1A14;box-sizing:border-box'>"
    +"<button id='fb-eye' style='position:absolute;right:10px;top:50%;transform:translateY(-50%);border:none;background:none;cursor:pointer;color:#6B6460;padding:0'><i class=\"ti ti-eye\" style=\"font-size:16px\"></i></button>"
    +"</div>"
    +"<div id='fb-err' style='display:none;background:#FFECEC;color:#8B2020;border-radius:10px;padding:9px 13px;font-size:13px;margin-bottom:12px;border:1px solid #FFD0D0'></div>"
    +"<button id='fb-btn' style='width:100%;background:linear-gradient(135deg,#5C2A3C,#2A5C52);color:#fff;border:none;border-radius:50px;padding:13px;font-family:DM Sans,sans-serif;font-size:14.5px;cursor:pointer;font-weight:700'>Masuk</button>"
    +"<div style='text-align:center;margin-top:14px;font-size:12px;color:#A8A098'>Data tersimpan aman di Firebase</div>";

  scr.appendChild(wrapper);
  document.body.appendChild(scr);

  // Events
  document.getElementById("fb-tl").addEventListener("click",()=>fbSwitchMode("login"));
  document.getElementById("fb-tr").addEventListener("click",()=>fbSwitchMode("register"));
  document.getElementById("fb-eye").addEventListener("click",function(){
    const pw=document.getElementById("fb-pw");
    const show=pw.type==="password";pw.type=show?"text":"password";
    this.innerHTML=show?'<i class="ti ti-eye-off" style="font-size:16px"></i>':'<i class="ti ti-eye" style="font-size:16px"></i>';
  });
  document.getElementById("fb-btn").addEventListener("click",fbDoSubmit);
  scr.querySelectorAll("input").forEach(inp=>inp.addEventListener("keydown",e=>{if(e.key==="Enter")fbDoSubmit();}));
}

function fbSwitchMode(mode){
  _fbMode=mode;const isReg=mode==="register";
  const tl=document.getElementById("fb-tl"),tr=document.getElementById("fb-tr"),ex=document.getElementById("fb-rx"),btn=document.getElementById("fb-btn"),err=document.getElementById("fb-err");
  if(tl){tl.style.background=isReg?"transparent":"#fff";tl.style.color=isReg?"#6B6460":"#2C1A14";tl.style.boxShadow=isReg?"none":"0 1px 3px rgba(0,0,0,.1)";}
  if(tr){tr.style.background=isReg?"#fff":"transparent";tr.style.color=isReg?"#2C1A14":"#6B6460";tr.style.boxShadow=isReg?"0 1px 3px rgba(0,0,0,.1)":"none";}
  if(ex)ex.style.display=isReg?"block":"none";
  if(btn)btn.textContent=isReg?"Daftar Sekarang":"Masuk";
  if(err){err.style.display="none";err.textContent="";}
}

function fbShowErr(msg){const e=document.getElementById("fb-err");if(e){e.textContent=msg;e.style.display="block";}}

async function fbDoSubmit(){
  if(!_fbReady){launchApp();return;}
  const err=document.getElementById("fb-err");if(err){err.style.display="none";err.textContent="";}
  const email=(document.getElementById("fb-em")||{}).value||"";
  const pass=(document.getElementById("fb-pw")||{}).value||"";
  if(!email){fbShowErr("Email wajib diisi.");return;}
  if(pass.length<6){fbShowErr("Kata sandi minimal 6 karakter.");return;}
  const btn=document.getElementById("fb-btn");
  if(btn){btn.textContent="Memproses...";btn.disabled=true;}

  const ERR={"auth/user-not-found":"Akun tidak ditemukan. Silakan daftar.","auth/wrong-password":"Kata sandi salah.","auth/invalid-email":"Format email tidak valid.","auth/email-already-in-use":"Email sudah terdaftar. Silakan masuk.","auth/weak-password":"Kata sandi minimal 6 karakter.","auth/invalid-credential":"Email atau kata sandi salah.","auth/too-many-requests":"Terlalu banyak percobaan. Tunggu sebentar.","auth/network-request-failed":"Tidak ada koneksi internet."};

  try{
    if(_fbMode==="login"){
      await _AU.signIn(_auth,email,pass);
    }else{
      const cred=await _AU.register(_auth,email,pass);
      _uid=cred.user.uid;
      const p1=(document.getElementById("fb-p1")||{}).value||"Partner 1";
      const p2=(document.getElementById("fb-p2")||{}).value||"Partner 2";
      const wd=(document.getElementById("fb-wd")||{}).value||new Date().toISOString().split("T")[0];
      S.couple.p1=p1;S.couple.p2=p2;S.couple.date=wd;
      await syncSettings();
    }
  }catch(e){
    fbShowErr(ERR[e.code]||("Error: "+e.message));
    if(btn){btn.textContent=_fbMode==="login"?"Masuk":"Daftar Sekarang";btn.disabled=false;}
  }
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   LAUNCH APP
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function launchApp(){
  hideLoadingOverlay();
  const scr=document.getElementById("fb-login");if(scr)scr.remove();
  const app=document.getElementById("app-root");if(app)app.style.display="flex";
  applyDark();applyLang();
  initTabs();
  renderPage("ringkasan");
}

/* ── Logout ── */
async function fbLogout(){
  closeSub();
  if(_fbReady&&_auth){try{await _AU.signOut(_auth);}catch(e){}}
  _uid=null;
  showLoginScreen();
}
document.addEventListener("click",function(e){
  if(e.target.closest&&e.target.closest("#sub-logout")){
    e.preventDefault();e.stopImmediatePropagation();fbLogout();
  }
},true);

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HOOK ALL SAVE/DELETE FUNCTIONS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
(function(){
  /* --- saveTx --- */
  var _sTx=saveTx;
  saveTx=function(id){
    _sTx(id);
    /* Jika add baru (id null), ambil item terbaru dari array */
    var syncId=id||S.transactions[0].id;
    syncTx(syncId);
  };
  /* --- saveSes --- */
  var _sSes=saveSes;
  saveSes=function(id){
    _sSes(id);
    var syncId=id||S.seserahan[S.seserahan.length-1].id;
    syncSes(syncId);
  };
  /* --- saveGuest --- */
  var _sG=saveGuest;
  saveGuest=function(id){
    _sG(id);
    var syncId=id||S.guests[S.guests.length-1].id;
    syncGuest(syncId);
  };
  /* --- saveDoc --- */
  var _sD=saveDoc;
  saveDoc=function(id){
    _sD(id);
    var syncId=id||S.documents[S.documents.length-1].id;
    syncDoc(syncId);
  };
  /* --- saveVendor --- */
  var _sV=saveVendor;
  saveVendor=function(id){
    _sV(id);
    var syncId=id||S.vendors[S.vendors.length-1].id;
    syncVendor(syncId);
  };
  /* --- delItem --- */
  var _del=delItem;
  delItem=function(type,id){
    const map={tx:"transactions",ses:"seserahan",guest:"guests",doc:"documents",vendor:"vendors"};
    if(!confirm(L("itemDeleted")+"?"))return;
    if(map[type])S[map[type]]=S[map[type]].filter(x=>String(x.id)!==String(id));
    closeModal();renderPage(curTab);showToast(L("itemDeleted"));
    if(map[type])fbDelete(map[type],id);
  };
  /* --- saveDetail --- */
  var _sDet=saveDetail;
  saveDetail=function(){_sDet();syncSettings();};
  /* --- cycleDoc --- */
  var _cyc=cycleDoc;
  cycleDoc=function(id){
    _cyc(id);
    var d=S.documents.find(x=>String(x.id)===String(id));
    if(d)fbSave("documents",d);
  };
  /* --- toggleVendorOk (inline in pgVendor via data-ok-vendor) --- */
  /* handled via bindListEvents refreshVendorList */
  /* --- applyDark / applyLang --- */
  var _aD=applyDark;
  applyDark=function(){_aD();if(_uid)syncSettings();};
  var _aL=applyLang;
  applyLang=function(){_aL();if(_uid)syncSettings();};
  /* --- initSubEvents: hook notif toggles + profile/cover photo --- */
  var _iSE=initSubEvents;
  initSubEvents=function(sub){
    _iSE(sub);
    var sp=document.getElementById("subpage-container");
    if(!sp)return;
    /* Notif toggles */
    if(sub==="notif"){
      sp.querySelectorAll(".toggle-sw[data-notif-key]").forEach(function(sw){
        var prev=sw.onclick;
        sw.onclick=function(){if(prev)prev.call(this);syncNotif();};
      });
    }
    /* Profile photo */
    if(sub==="main"){
      var pp=sp.querySelector("#profile-photo-btn");
      if(pp){
        pp.onclick=function(){
          pickPhoto(function(d){
            S.profilePhoto=d;
            openSub("main");
            showToast("Foto berhasil disimpan");
            syncSettings();
          });
        };
      }
    }
    /* Cover photo */
    if(sub==="detail"){
      var cb=sp.querySelector("#cover-photo-btn");
      if(cb){
        cb.onclick=function(){
          pickPhoto(function(d){
            S.coverPhoto=d;
            var prev=sp.querySelector("#cover-photo-preview");
            if(prev){
              prev.innerHTML="";
              var img=document.createElement("img");img.src=d;img.style.cssText="width:100%;height:100%;object-fit:cover;border-radius:14px";prev.appendChild(img);
              var ov=document.createElement("div");ov.className="photo-overlay";ov.textContent="Ganti Cover";prev.appendChild(ov);
            }
            syncSettings();
          });
        };
      }
      /* Re-bind after hook: ensure saveDetail also refreshes couple-card */
      /* Save detail button also syncs */
      var sv=sp.querySelector("#save-detail-btn");
      if(sv){
        var prevSv=sv.onclick;
        sv.onclick=function(){if(prevSv)prevSv.call(this);syncSettings();};
      }
    }
  };
  /* --- ok-vendor toggle sync --- */
  var _rvl=refreshVendorList;
  refreshVendorList=function(){
    _rvl();
    /* bind ok-vendor with sync */
    document.querySelectorAll("[data-ok-vendor]").forEach(function(b){
      var prev=b.onclick;
      b.onclick=function(){
        var vid=b.dataset.okVendor;
        var v=S.vendors.find(x=>String(x.id)===String(vid));
        if(v){v.ok=!v.ok;refreshVendorList();fbSave("vendors",v);}
      };
    });
  };
})();

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   INIT
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
(async function(){
  var app=document.getElementById("app-root");if(app)app.style.display="none";
  showLoadingOverlay("Menghubungkan ke server...");
  await initFirebase();
  if(!_fbReady){hideLoadingOverlay();launchApp();}
})();
</script>
