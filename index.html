<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);

        }

            background: linear-gradient(135deg, #f8c8dc 0%, #b8e8ee 100%);
        }

            transition: border-color 0.3s ease;

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background min-h-screen flex flex-col font-body-md text-on-background antialiased relative overflow-x-hidden">
<!-- Ambient Background Element -->
<div class="absolute top-0 left-0 w-full h-[300px] bg-gradient-to-b from-primary-fixed to-transparent opacity-40 pointer-events-none z-0"></div>
<div class="absolute top-[-50px] right-[-50px] w-64 h-64 rounded-full bg-secondary-fixed blur-3xl opacity-30 pointer-events-none z-0"></div>
<!-- Top Navigation (Transactional - minimal) -->
<header class="w-full sticky top-0 z-50 bg-surface/80 backdrop-blur-md border-b border-outline-variant flex justify-between items-center px-4 py-4 md:px-margin-desktop md:max-w-container-max md:mx-auto">
<a class="flex items-center gap-2 text-on-surface hover:text-primary transition-colors cursor-pointer group" href="{{DATA:SCREEN:SCREEN_54}}">
<span class="material-symbols-outlined group-active:opacity-80">arrow_back</span>
</a>
<div class="font-headline-md text-headline-md text-on-surface tracking-tight text-center flex-grow">
            Add Item
        </div>
<div class="w-6"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Area -->
<main class="flex-grow w-full max-w-[600px] mx-auto px-4 py-8 z-10 flex flex-col gap-6">
<div class="text-center mb-4">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">New Seserahan</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Add details for your upcoming gift or dowry item.</p>
</div>
<form class="glass-panel rounded-xl p-6 flex flex-col gap-6">
<!-- Nama Barang -->
<div class="flex flex-col gap-2 relative">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="nama_barang">Nama Barang</label>
<div class="input-border-transition border-b border-outline-variant relative">
<input class="w-full bg-transparent border-none focus:ring-0 px-0 py-2 font-body-lg text-body-lg text-on-surface placeholder-outline" id="nama_barang" placeholder="e.g., Mukena, Perhiasan" required="" type="text"/>
</div>
</div>
<!-- Kategori -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="kategori">Kategori</label>
<div class="input-border-transition border-b border-outline-variant relative">
<select class="w-full bg-transparent border-none focus:ring-0 px-0 py-2 font-body-lg text-body-lg text-on-surface appearance-none pr-8 cursor-pointer" id="kategori">
<option class="text-on-surface bg-surface" value="seserahan">Seserahan</option>
<option class="text-on-surface bg-surface" value="mahar">Mahar</option>
</select>
<span class="material-symbols-outlined absolute right-0 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
<!-- Harga/Estimasi -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="harga">Harga/Estimasi</label>
<div class="input-border-transition border-b border-outline-variant relative flex items-center">
<span class="font-body-lg text-body-lg text-on-surface-variant pr-2">Rp</span>
<input class="w-full bg-transparent border-none focus:ring-0 px-0 py-2 font-body-lg text-body-lg text-on-surface placeholder-outline" id="harga" placeholder="0" required="" type="number"/>
</div>
</div>
<!-- Status -->
<div class="flex flex-col gap-3">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Status</label>
<div class="flex flex-col gap-2 sm:flex-row sm:flex-wrap">
<label class="cursor-pointer relative">
<input checked="" class="peer sr-only" name="status" type="radio" value="belum_dibeli"/>
<div class="rounded-full px-4 py-2 border border-outline-variant text-center font-body-md text-body-md text-on-surface peer-checked:bg-secondary-container peer-checked:border-secondary-container peer-checked:text-on-secondary-container transition-all">
                            Belum Dibeli
                        </div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="status" type="radio" value="sudah_dibeli"/>
<div class="rounded-full px-4 py-2 border border-outline-variant text-center font-body-md text-body-md text-on-surface peer-checked:bg-secondary-container peer-checked:border-secondary-container peer-checked:text-on-secondary-container transition-all">
                            Sudah Dibeli
                        </div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="status" type="radio" value="sudah_dihias"/>
<div class="rounded-full px-4 py-2 border border-outline-variant text-center font-body-md text-body-md text-on-surface peer-checked:bg-secondary-container peer-checked:border-secondary-container peer-checked:text-on-secondary-container transition-all">
                            Sudah Dihias
                        </div>
</label>
</div>
</div>
<!-- Notes -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="notes">Notes (Optional)</label>
<div class="input-border-transition border-b border-outline-variant relative">
<textarea class="w-full bg-transparent border-none focus:ring-0 px-0 py-2 font-body-md text-body-md text-on-surface placeholder-outline resize-none" id="notes" placeholder="Add any special instructions or details..." rows="3"></textarea>
</div>
</div>
</form>
</main>
<!-- Bottom Sticky CTA -->
<div class="w-full sticky bottom-0 z-50 bg-surface/90 backdrop-blur-md border-t border-outline-variant px-4 py-4 md:px-margin-desktop shadow-[0_-4px_20px_rgba(176,224,230,0.2)]">
<div class="max-w-[600px] mx-auto">
<a class="w-full ethereal-gradient rounded-full py-4 px-8 flex justify-center items-center gap-2 shadow-[0_4px_15px_rgba(248,200,220,0.4)] hover:shadow-[0_6px_20px_rgba(248,200,220,0.6)] transition-all active:scale-95 cursor-pointer" href="{{DATA:SCREEN:SCREEN_54}}">
<span class="font-label-sm text-label-sm text-on-primary uppercase tracking-wider">Simpan Seserahan</span>
<span class="material-symbols-outlined text-on-primary text-xl">check_circle</span>
</a>
</div>
</div>
</body></html>
